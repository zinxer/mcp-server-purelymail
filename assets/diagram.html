<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Works Together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1280px;
    height: 520px;
    overflow: hidden;
    background: #0d0d12;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* top accent line */
  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 5%, rgba(139,92,246,0.6) 50%, transparent 95%);
  }

  .layout {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    width: 1240px;
  }

  /* ── Nodes ── */
  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .node-icon {
    width: 96px; height: 96px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid;
    position: relative;
    overflow: hidden;
  }
  .node-icon img { width: 56px; height: 56px; object-fit: contain; }
  .node-icon-claude {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.1);
  }
  .node-icon-claude .claude-svg { width: 58px; height: 58px; }
  .node-title {
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
    text-align: center;
  }
  .node-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.28);
    white-space: nowrap; text-align: center;
  }

  /* ── Fork (two arrows out of Claude) ── */
  .fork {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    margin: 0 8px;
    margin-bottom: 40px;
  }
  .fork-arm {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .fork-arm-top { padding-bottom: 36px; }
  .fork-arm-bottom { padding-top: 36px; }
  .fork-line-h {
    width: 140px; height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.12), var(--line-color));
    position: relative;
  }
  .fork-line-h::after {
    content: '';
    position: absolute;
    right: -1px; top: -3px;
    border-top: 3.5px solid transparent;
    border-bottom: 3.5px solid transparent;
    border-left: 6px solid var(--line-color);
  }
  .fork-line-v {
    width: 1px; height: 17px;
    background: rgba(255,255,255,0.08);
    margin-left: 0;
  }
  .arm-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    padding: 0 6px;
    white-space: nowrap;
  }

  /* ── MCP pair column ── */
  .pair-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Single MCP card ── */
  .mcp-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 16px;
    border: 1px solid;
    width: 320px;
  }
  .mcp-card-cf {
    background: rgba(246,130,31,0.06);
    border-color: rgba(246,130,31,0.2);
  }
  .mcp-card-pm {
    background: rgba(139,92,246,0.08);
    border-color: rgba(139,92,246,0.25);
    box-shadow: 0 0 20px rgba(139,92,246,0.08);
  }
  .mcp-card-logo {
    width: 44px; height: 44px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    overflow: hidden;
  }
  .mcp-card-logo img { width: 36px; height: 36px; object-fit: contain; }
  .mcp-card-body { display: flex; flex-direction: column; gap: 4px; }
  .mcp-card-name {
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
  }
  .mcp-card-npm {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.28);
  }

  /* ── Arrow between MCP and service ── */
  .arrow-h {
    width: 100px; height: 1px;
    position: relative;
    flex-shrink: 0;
    margin-bottom: 40px;
  }
  .arrow-h::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, var(--arrow-color, rgba(255,255,255,0.12)), transparent);
  }
  .arrow-h::after {
    content: '';
    position: absolute;
    right: 0; top: -3px;
    border-top: 3.5px solid transparent;
    border-bottom: 3.5px solid transparent;
    border-left: 6px solid var(--arrow-color, rgba(255,255,255,0.2));
  }

  /* ── Service node ── */
  .service-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .service-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 140px;
  }
  .service-icon {
    width: 64px; height: 64px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid;
    overflow: hidden;
  }
  .service-icon img { width: 42px; height: 42px; object-fit: contain; }
  .service-icon-cf { background: rgba(246,130,31,0.08); border-color: rgba(246,130,31,0.22); }
  .service-icon-pm { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.28); }
  .service-name {
    font-size: 14px; font-weight: 600;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
  }
  .service-role {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-align: center;
    line-height: 1.35;
    white-space: nowrap;
  }

  /* ── Outcome badge ── */
  .outcome {
    margin-left: 48px;
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .outcome-badge {
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1));
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 16px;
    padding: 22px 30px;
    text-align: center;
    max-width: 210px;
  }
  .outcome-emoji { font-size: 32px; }
  .outcome-title {
    margin-top: 8px;
    font-size: 16px; font-weight: 700;
    color: rgba(255,255,255,0.9);
    line-height: 1.3;
  }
  .outcome-sub {
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    line-height: 1.4;
  }

  /* vertical divider between fork arms */
  .fork-v-line {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.06);
  }
</style>
</head>
